<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Honda Assistant - Honda Pelaihari</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #cc0000 0%, #880000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            background: linear-gradient(135deg, #cc0000 0%, #880000 100%);
            color: white;
            padding: 16px 20px 12px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .chat-header .subtitle {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 2px;
        }

        .chat-header .contact-info {
            font-size: 11px;
            opacity: 0.85;
            margin-top: 2px;
        }

        .status-badge {
            display: inline-block;
            background: #4caf50;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 10px;
            margin-top: 6px;
        }

        .period-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 10px;
            margin-top: 4px;
            margin-left: 6px;
        }

        .reset-chat {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }
        .reset-chat:hover {
            background: rgba(255,255,255,0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fa;
        }

        .message-bot {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        .bot-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #cc0000, #880000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .bot-text {
            background: white;
            padding: 12px 16px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
            color: #202124;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-user {
            display: flex;
            justify-content: flex-end;
            animation: fadeIn 0.3s ease;
        }

        .user-text {
            background: #cc0000;
            color: white;
            padding: 12px 16px;
            border-radius: 18px;
            border-top-right-radius: 4px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
        }

        .chat-input {
            background: white;
            padding: 12px 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input:focus { border-color: #cc0000; }

        .chat-input button {
            background: #cc0000;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .chat-input button:hover { background: #880000; }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .quick-btn {
            background: #fdecea;
            border: none;
            padding: 7px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #cc0000;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover { background: #f8c4c4; }

        .motor-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #e0e0e0;
        }

        .motor-image {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 12px;
            background: #f5f5f5;
            margin-bottom: 8px;
        }

        .motor-name {
            font-weight: bold;
            font-size: 15px;
            color: #cc0000;
        }

        .motor-tipe {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .motor-price {
            font-size: 17px;
            font-weight: bold;
            color: #333;
            margin: 6px 0 2px;
        }

        .motor-dp {
            font-size: 12px;
            color: #555;
        }

        .installment {
            background: #fdecea;
            padding: 8px 10px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.8;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: #f1f1f1; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        .wa-button {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 10px 16px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
        .wa-button:hover {
            background: #128C7E;
        }

        @media (min-width: 768px) {
            body { padding: 32px; }
            .chat-container { max-width: 500px; height: 85vh; border-radius: 28px; }
        }
    </style>
</head>

function formatRupiah(angka) {
    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
}

function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;

function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

function saveChatHistory() {
    const messages = [];
    const messageElements = chatMessages.querySelectorAll('.message-bot, .message-user');
    messageElements.forEach(el => {
        const isUser = el.classList.contains('message-user');
        let text = '';
        if (isUser) {
            const userText = el.querySelector('.user-text');
            if (userText) text = userText.textContent;
        } else {
            const botText = el.querySelector('.bot-text');
            if (botText) text = botText.innerHTML;
        }
        if (text) {
            messages.push({ isUser, text });
        }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

function loadChatHistory() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    
    try {
        const messages = JSON.parse(saved);
        if (messages.length === 0) return false;
        
        chatMessages.innerHTML = '';
        
        messages.forEach(msg => {
            const messageDiv = document.createElement('div');
            messageDiv.className = msg.isUser ? 'message-user' : 'message-bot';
            if (msg.isUser) {
                messageDiv.innerHTML = `<div class="user-text">${escapeHtml(msg.text)}</div>`;
            } else {
                messageDiv.innerHTML = `<div class="bot-avatar">🤖</div><div class="bot-text">${msg.text}</div>`;
            }
            chatMessages.appendChild(messageDiv);
        });
        
        scrollToBottom();
        return true;
    } catch(e) {
        return false;
    }
}

function resetChat() {
    if (confirm('Reset percakapan? Semua riwayat chat akan hilang.')) {
        localStorage.removeItem(STORAGE_KEY);
        chatMessages.innerHTML = '';
        addMessage(`

function getMotorMatches(query) {
    const q = query.toLowerCase().trim();
    if (!q || q.length < 2) return [];
    return motorData.filter(m => {
        const n = m.nama.toLowerCase();
        const tanpaKode = n.replace(/\([^)]*\)/g, '').trim();
        return n.includes(q) || tanpaKode.includes(q);
    });
}

function getMotorInfo(query) {
    const q = query.toLowerCase().trim();
    if (!q || q.length < 2) return null;
    let best = null, bestScore = 0;
    for (const m of motorData) {
        const n = m.nama.toLowerCase();
        const tanpaKode = n.replace(/\([^)]*\)/g, '').trim();
        let score = 0;
        if (tanpaKode === q || n === q) score = 100;
        else if (tanpaKode.includes(q) || n.includes(q)) score = 50;
        else {
            const words = q.split(' ');
            const matched = words.filter(w => w.length > 1 && (n.includes(w) || tanpaKode.includes(w))).length;
            score = matched * 10;
        }
        if (score > bestScore) { bestScore = score; best = m; }
    }
    return bestScore > 0 ? best : null;
}

async function sendMessage() {
    const message = chatInput.value.trim();
    if (!message) return;
    addMessage(message, true);
    chatInput.value = "";
    showTyping();
    setTimeout(() => {
        hideTyping();
        addMessage(processMessage(message), false);
    }, 500);
}

function processMessage(message) {
    const msg = message.toLowerCase().trim();

    // Validasi minimal panjang
    if (msg.length < 2 && !msg.includes('harga') && !msg.includes('info')) {
        return `Halo! 👋 Silakan ketik pertanyaan yang lebih jelas, misalnya:<br>• "Harga Vario 160"<br>• "Info dealer"<br>• "Syarat kredit"<br>• "Booking service"`;
    }

    // BOOKING SERVICE (diletakkan di awal agar cepat terdeteksi)
    if (msg.includes('service') || msg.includes('servis') || msg.includes('booking service') || 
        (msg.includes('booking') && msg.includes('service')) || msg.includes('service motor') ||
        msg.includes('servis motor') || msg.includes('booking servis')) {
        return getBookingServiceMessage();
    }

    // Sapaan
    const salam = ['halo', 'hai', 'hi', 'hello', 'hei', 'selamat pagi', 'selamat siang', 'selamat sore', 'selamat malam', 'assalamualaikum', 'permisi'];
    if (salam.some(s => msg === s || msg.startsWith(s + ' '))) {
        return `Salam satu hati! 👋 Selamat datang di <b>Honda Pelaihari</b>!<br><br>Saya siap bantu info harga, simulasi kredit, booking motor, dan booking service.<br><br>Ketik nama motor yang Anda minati, atau coba:<br>• "Semua harga"&nbsp;• "Motor matic"&nbsp;• "Motor sport"&nbsp;• "Motor cub"<br>• "Syarat kredit"&nbsp;• "Info dealer"&nbsp;• "Booking service" 😊`;
    }

    // Info dealer / lokasi / kontak
    if (msg.includes('dealer') || msg.includes('alamat') || msg.includes('lokasi') || msg.includes('kontak') || msg.includes('telepon') || msg.includes('nomor') || msg.includes('info dealer') || msg.includes('showroom')) {
        return getDealerInfo();
    }

    // Syarat kredit
    if (msg.includes('syarat') || msg.includes('persyaratan') || msg.includes('dokumen') || msg.includes('ktp') || msg.includes('berkas')) {
        return getSyaratKredit();
    }

    // Semua harga / daftar harga
    if (msg.includes('semua harga') || msg.includes('daftar harga') || msg === 'harga' || msg === 'list harga') {
        return getAllPrices();
    }

    // Filter tipe motor
    if (msg.includes('motor matic') || msg === 'matic') return getAllPrices('Matic');
    if (msg.includes('motor sport') || msg === 'sport') return getAllPrices('Sport');
    if (msg.includes('motor cub') || msg.includes('motor bebek') || msg === 'cub' || msg === 'bebek') return getAllPrices('Cub');
    if (msg.includes('motor adventure') || (msg.includes('adv') && !msg.includes('harga') && !msg.includes('simulasi'))) {
        const matches = getMotorMatches('adv');
        if (matches.length > 0) {
            let html = `<b>🏍️ MOTOR ADVENTURE HONDA</b><br><br>`;
            for (const m of matches) html += `• <b>${m.nama}</b> | OTR: ${formatRupiah(m.otr)}<br>`;
            html += '<br><i>Ketik nama motor untuk detail!</i>';
            return html;
        }
    }
    if (msg.includes('motor premium') || msg.includes('premium')) return getAllPrices('Matic Premium');
    if (msg.includes('motor fashion') || msg.includes('fashion')) return getAllPrices('Matic Fashion');

    // Simulasi kredit / angsuran
    if (msg.includes('simulasi') || msg.includes('kredit') || msg.includes('angsuran') || msg.includes('cicilan')) {
        let motorName = msg.replace(/simulasi|kredit|angsuran|cicilan/gi, '').trim();
        if (!motorName) return "Motor apa yang ingin disimulasikan? Contoh: 'Simulasi kredit PCX 160'";
        const motor = getMotorInfo(motorName);
        if (motor) return formatMotorDetail(motor);
        return `Motor "<b>${escapeHtml(motorName)}</b>" tidak ditemukan. Coba ketik nama yang lebih spesifik, atau ketik "Semua harga" untuk melihat daftar lengkap.`;
    }

    // Harga spesifik motor
    if (msg.includes('harga')) {
        let motorName = msg.replace(/harga/gi, '').trim();
        if (!motorName) return getAllPrices();
        const matches = getMotorMatches(motorName);
        if (matches.length === 1) return formatMotorDetail(matches[0]);
        if (matches.length > 1) {
            let html = `<b>Ditemukan ${matches.length} motor:</b><br><br>`;
            for (const m of matches) html += `• <b>${m.nama}</b> — OTR: ${formatRupiah(m.otr)}<br>`;
            html += '<br><div class="quick-buttons">';
            for (const m of matches) {
                const s = m.nama.replace(/\s*\([^)]*\)/g, '').trim();
                html += `<button class="quick-btn" onclick="sendQuickMessage('Harga ${s}')">${s}</button>`;
            }
            html += '</div><br><i>Pilih salah satu untuk detail lengkap! atau tulis kode motor yang kamu inginkan</i>';
            return html;
        }
        return `Motor "<b>${escapeHtml(motorName)}</b>" tidak ditemukan. Ketik "Semua harga" untuk daftar lengkap.`;
    }

    // Cari langsung tanpa keyword
    const matches = getMotorMatches(msg);
    if (matches.length === 1) return formatMotorDetail(matches[0]);
    if (matches.length > 1) {
        let html = `<b>🏍️ Ditemukan ${matches.length} motor yang cocok:</b><br><br>`;
        for (const m of matches) html += `• <b>${m.nama}</b> — OTR: ${formatRupiah(m.otr)}<br>`;
        html += '<br><div class="quick-buttons">';
        for (const m of matches) {
            const s = m.nama.replace(/\s*\([^)]*\)/g, '').trim();
            html += `<button class="quick-btn" onclick="sendQuickMessage('${s}')">${s}</button>`;
        }
        html += '</div><br><i>Pilih salah satu untuk detail lengkap! atau tulis kode motor yang kamu inginkan</i>';
        return html;
    }

    // Default
    return `
        Maaf, saya tidak mengerti pertanyaan: "<b>${escapeHtml(message)}</b>"<br><br>
        Coba tanyakan:<br>
        • "Harga Beat" / "Harga Vario 160" / "Harga PCX"<br>
        • "Semua harga" / "Motor matic" / "Motor sport"<br>

    `;
}

function sendQuickMessage(message) {
    chatInput.value = message;
    sendMessage();
}

function handleKeyPress(event) {
    if (event.key === 'Enter') sendMessage();
}

function addQuickReplies() {
    const quickDiv = document.createElement('div');
    quickDiv.className = 'message-bot';
    quickDiv.innerHTML = `
        <div class="bot-avatar">🤖</div>

                <button class="quick-btn" onclick="sendQuickMessage('Semua harga')">📋 Semua Harga</button>
                <button class="quick-btn" onclick="sendQuickMessage('Syarat kredit')">📄 Syarat Kredit</button>

                <button class="quick-btn" onclick="window.open('${dealerInfo.linkBookingService}', '_blank')">🔧 Booking Service</button>
            </div>
        </div>
    `;
    chatMessages.appendChild(quickDiv);
    scrollToBottom();
    saveChatHistory();
}
